<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" fill="none">
  <!-- Sky -->
  <rect width="400" height="320" fill="#FFF7ED"/>
  <!-- Sun -->
  <circle cx="320" cy="60" r="38" fill="#FCD34D"/>
  <!-- Sun rays -->
  <g stroke="#FCD34D" stroke-width="3" stroke-linecap="round">
    <line x1="320" y1="10" x2="320" y2="2"/>
    <line x1="320" y1="118" x2="320" y2="110"/>
    <line x1="272" y1="60" x2="264" y2="60"/>
    <line x1="376" y1="60" x2="368" y2="60"/>
    <line x1="286" y1="26" x2="280" y2="20"/>
    <line x1="360" y1="100" x2="354" y2="94"/>
    <line x1="354" y1="26" x2="360" y2="20"/>
    <line x1="280" y1="100" x2="286" y2="94"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="240" width="400" height="80" fill="#D1FAE5"/>
  <!-- Grass details -->
  <ellipse cx="60" cy="240" rx="40" ry="6" fill="#A7F3D0"/>
  <ellipse cx="200" cy="240" rx="80" ry="6" fill="#A7F3D0"/>
  <ellipse cx="350" cy="240" rx="45" ry="6" fill="#A7F3D0"/>
  <!-- House body -->
  <rect x="90" y="160" width="180" height="80" fill="#F9FAFB"/>
  <rect x="90" y="160" width="180" height="80" stroke="#E5E7EB" stroke-width="2"/>
  <!-- Roof -->
  <polygon points="75,160 180,85 305,160" fill="#F97316"/>
  <!-- Roof edge -->
  <polyline points="75,160 180,85 305,160" stroke="#EA580C" stroke-width="2"/>
  <!-- Solar panels on roof (left side) -->
  <rect x="108" y="112" width="28" height="18" rx="2" fill="#1E3A5F"/>
  <rect x="108" y="112" width="28" height="18" rx="2" stroke="#3B82F6" stroke-width="1"/>
  <line x1="122" y1="112" x2="122" y2="130" stroke="#3B82F6" stroke-width="0.8"/>
  <line x1="108" y1="121" x2="136" y2="121" stroke="#3B82F6" stroke-width="0.8"/>
  <!-- Solar panels on roof (center) -->
  <rect x="142" y="102" width="28" height="18" rx="2" fill="#1E3A5F"/>
  <rect x="142" y="102" width="28" height="18" rx="2" stroke="#3B82F6" stroke-width="1"/>
  <line x1="156" y1="102" x2="156" y2="120" stroke="#3B82F6" stroke-width="0.8"/>
  <line x1="142" y1="111" x2="170" y2="111" stroke="#3B82F6" stroke-width="0.8"/>
  <!-- Solar panels on roof (right side) -->
  <rect x="176" y="111" width="28" height="18" rx="2" fill="#1E3A5F"/>
  <rect x="176" y="111" width="28" height="18" rx="2" stroke="#3B82F6" stroke-width="1"/>
  <line x1="190" y1="111" x2="190" y2="129" stroke="#3B82F6" stroke-width="0.8"/>
  <line x1="176" y1="120" x2="204" y2="120" stroke="#3B82F6" stroke-width="0.8"/>
  <!-- Door -->
  <rect x="160" y="198" width="32" height="42" rx="3" fill="#D97706"/>
  <circle cx="188" cy="221" r="3" fill="#F9FAFB"/>
  <!-- Windows -->
  <rect x="104" y="178" width="34" height="26" rx="3" fill="#BAE6FD"/>
  <line x1="121" y1="178" x2="121" y2="204" stroke="#7DD3FC" stroke-width="1"/>
  <line x1="104" y1="191" x2="138" y2="191" stroke="#7DD3FC" stroke-width="1"/>
  <rect x="226" y="178" width="34" height="26" rx="3" fill="#BAE6FD"/>
  <line x1="243" y1="178" x2="243" y2="204" stroke="#7DD3FC" stroke-width="1"/>
  <line x1="226" y1="191" x2="260" y2="191" stroke="#7DD3FC" stroke-width="1"/>
  <!-- Tree left -->
  <rect x="42" y="196" width="8" height="44" fill="#78350F"/>
  <ellipse cx="46" cy="188" rx="26" ry="30" fill="#16A34A"/>
  <ellipse cx="34" cy="198" rx="16" ry="20" fill="#22C55E"/>
  <ellipse cx="58" cy="198" rx="16" ry="20" fill="#22C55E"/>
  <!-- Tree right -->
  <rect x="330" y="196" width="8" height="44" fill="#78350F"/>
  <ellipse cx="334" cy="188" rx="26" ry="30" fill="#16A34A"/>
  <ellipse cx="322" cy="198" rx="16" ry="20" fill="#22C55E"/>
  <ellipse cx="346" cy="198" rx="16" ry="20" fill="#22C55E"/>
</svg>
