<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#F0F9FF"/>
  <!-- Document stack background -->
  <rect x="60" y="60" width="180" height="220" rx="10" fill="#E2E8F0" transform="rotate(-6 60 60)"/>
  <rect x="70" y="55" width="180" height="220" rx="10" fill="#EFF6FF" transform="rotate(-2 70 55)"/>
  <!-- Main document -->
  <rect x="80" y="50" width="180" height="220" rx="10" fill="white" stroke="#CBD5E1" stroke-width="2"/>
  <!-- Document header bar -->
  <rect x="80" y="50" width="180" height="36" rx="10" fill="#1E3A5F"/>
  <rect x="80" y="70" width="180" height="16" fill="#1E3A5F"/>
  <text x="170" y="73" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="sans-serif">MNRE APPROVAL</text>
  <!-- Document seal -->
  <circle cx="170" cy="156" r="40" fill="#FEF3C7" stroke="#FCD34D" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="170" cy="156" r="30" fill="#FCD34D"/>
  <!-- Checkmark in seal -->
  <g stroke="#D97706" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <line x1="155" y1="156" x2="164" y2="166"/>
    <line x1="164" y1="166" x2="185" y2="144"/>
  </g>
  <text x="170" y="192" text-anchor="middle" fill="#92400E" font-size="8" font-weight="bold" font-family="sans-serif">APPROVED</text>
  <!-- Line items on doc -->
  <rect x="96"  y="100" width="60" height="6" rx="3" fill="#CBD5E1"/>
  <rect x="96"  y="112" width="100" height="5" rx="2.5" fill="#CBD5E1"/>
  <rect x="96"  y="122" width="80" height="5" rx="2.5" fill="#CBD5E1"/>
  <rect x="96"  y="208" width="70" height="6" rx="3" fill="#CBD5E1"/>
  <rect x="96"  y="220" width="100" height="5" rx="2.5" fill="#CBD5E1"/>
  <rect x="96"  y="230" width="55" height="5" rx="2.5" fill="#CBD5E1"/>
  <!-- Solar panel icon top right of doc -->
  <rect x="220" y="102" width="28" height="18" rx="3" fill="#1E3A5F"/>
  <line x1="234" y1="102" x2="234" y2="120" stroke="#3B82F6" stroke-width="1"/>
  <line x1="220" y1="111" x2="248" y2="111" stroke="#3B82F6" stroke-width="1"/>
  <!-- Government building (right side) -->
  <rect x="288" y="100" width="90" height="130" fill="#F1F5F9"/>
  <rect x="288" y="100" width="90" height="130" stroke="#CBD5E1" stroke-width="2"/>
  <!-- Columns -->
  <rect x="298" y="110" width="8" height="80" rx="2" fill="#E2E8F0"/>
  <rect x="316" y="110" width="8" height="80" rx="2" fill="#E2E8F0"/>
  <rect x="334" y="110" width="8" height="80" rx="2" fill="#E2E8F0"/>
  <rect x="352" y="110" width="8" height="80" rx="2" fill="#E2E8F0"/>
  <!-- Pediment/triangle top -->
  <polygon points="282,100 333,60 384,100" fill="#CBD5E1"/>
  <!-- Flag on top -->
  <line x1="333" y1="60" x2="333" y2="28" stroke="#64748B" stroke-width="2"/>
  <polygon points="333,28 355,36 333,44" fill="#F97316"/>
  <!-- Steps -->
  <rect x="280" y="230" width="98" height="8" rx="2" fill="#E2E8F0"/>
  <rect x="276" y="238" width="106" height="8" rx="2" fill="#E2E8F0"/>
  <!-- Door -->
  <rect x="318" y="196" width="26" height="38" rx="3" fill="#3B82F6"/>
  <circle cx="339" cy="217" r="3" fill="#EFF6FF"/>
  <!-- Arrow connecting doc to building -->
  <path d="M 260 160 Q 274 160 280 160" stroke="#F97316" stroke-width="2.5" stroke-dasharray="4,2"/>
  <polygon points="280,155 293,160 280,165" fill="#F97316"/>
</svg>
