<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#FFF7ED"/>
  <!-- Desk -->
  <rect x="40" y="200" width="280" height="14" rx="4" fill="#D97706"/>
  <rect x="60" y="214" width="10" height="60" rx="2" fill="#B45309"/>
  <rect x="290" y="214" width="10" height="60" rx="2" fill="#B45309"/>
  <!-- Blueprint document on desk -->
  <rect x="80" y="140" width="200" height="62" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <!-- Solar panel layout on blueprint -->
  <rect x="96"  y="150" width="22" height="14" rx="2" fill="#1E3A5F"/><line x1="107" y1="150" x2="107" y2="164" stroke="#3B82F6" stroke-width="0.7"/><line x1="96"  y1="157" x2="118" y2="157" stroke="#3B82F6" stroke-width="0.7"/>
  <rect x="124" y="150" width="22" height="14" rx="2" fill="#1E3A5F"/><line x1="135" y1="150" x2="135" y2="164" stroke="#3B82F6" stroke-width="0.7"/>
  <rect x="152" y="150" width="22" height="14" rx="2" fill="#1E3A5F"/>
  <rect x="180" y="150" width="22" height="14" rx="2" fill="#1E3A5F"/>
  <rect x="208" y="150" width="22" height="14" rx="2" fill="#1E3A5F"/>
  <rect x="96"  y="170" width="22" height="14" rx="2" fill="#1E3A5F"/>
  <rect x="124" y="170" width="22" height="14" rx="2" fill="#1E3A5F"/>
  <rect x="152" y="170" width="22" height="14" rx="2" fill="#1E3A5F"/>
  <rect x="180" y="170" width="22" height="14" rx="2" fill="#1E3A5F"/>
  <rect x="208" y="170" width="22" height="14" rx="2" fill="#1E3A5F"/>
  <!-- Dotted ruler on blueprint -->
  <line x1="88" y1="196" x2="272" y2="196" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Pencil on blueprint -->
  <rect x="250" y="148" width="6" height="34" rx="2" fill="#FCD34D" transform="rotate(-25 250 148)"/>
  <polygon points="248,183 254,181 251,190" fill="#94A3B8" transform="rotate(-25 250 148)"/>
  <!-- Laptop screen showing graph -->
  <rect x="64" y="72" width="120" height="80" rx="6" fill="#1E293B"/>
  <rect x="64" y="72" width="120" height="80" rx="6" stroke="#334155" stroke-width="2"/>
  <rect x="70" y="78" width="108" height="68" rx="3" fill="#0F172A"/>
  <!-- Bar chart on laptop -->
  <rect x="80"  y="118" width="12" height="20" rx="2" fill="#F97316"/>
  <rect x="96"  y="108" width="12" height="30" rx="2" fill="#F97316"/>
  <rect x="112" y="100" width="12" height="38" rx="2" fill="#F97316"/>
  <rect x="128" y="93" width="12" height="45" rx="2" fill="#FCD34D"/>
  <rect x="144" y="88" width="12" height="50" rx="2" fill="#22C55E"/>
  <rect x="160" y="82" width="12" height="56" rx="2" fill="#22C55E"/>
  <!-- Laptop base -->
  <rect x="48" y="152" width="154" height="8" rx="4" fill="#334155"/>
  <!-- Person (consultant) -->
  <!-- Head -->
  <circle cx="320" cy="100" r="30" fill="#FED7AA"/>
  <!-- Hair -->
  <ellipse cx="320" cy="82" rx="30" ry="14" fill="#92400E"/>
  <!-- Body -->
  <rect x="288" y="130" width="64" height="76" rx="10" fill="#F97316"/>
  <!-- Tie -->
  <polygon points="320,130 312,158 320,168 328,158" fill="#C2410C"/>
  <!-- Arms -->
  <rect x="262" y="134" width="28" height="14" rx="7" fill="#F97316"/>
  <rect x="350" y="134" width="28" height="14" rx="7" fill="#F97316"/>
  <!-- Pointing hand -->
  <circle cx="258" cy="142" r="10" fill="#FED7AA"/>
  <!-- Legs -->
  <rect x="296" y="206" width="20" height="50" rx="6" fill="#1E293B"/>
  <rect x="324" y="206" width="20" height="50" rx="6" fill="#1E293B"/>
  <!-- Arrow pointing at blueprint -->
  <path d="M 268 148 L 272 192" stroke="#64748B" stroke-width="2" stroke-dasharray="3,2"/>
  <polygon points="268,192 272,204 276,192" fill="#64748B"/>
</svg>
