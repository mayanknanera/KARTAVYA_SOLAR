  <rect x="114" y="72" width="36" height="24" rx="2" fill="#1E3A5F"/><line x1="132" y1="72" x2="132" y2="96" stroke="#3B82F6" stroke-width="0.8"/><line x1="114" y1="84" x2="150" y2="84" stroke="#3B82F6" stroke-width="0.8"/>
  <rect x="156" y="72" width="36" height="24" rx="2" fill="#1E3A5F"/><line x1="174" y1="72" x2="174" y2="96" stroke="#3B82F6" stroke-width="0.8"/><line x1="156" y1="84" x2="192" y2="84" stroke="#3B82F6" stroke-width="0.8"/>
  <rect x="198" y="72" width="36" height="24" rx="2" fill="#1E3A5F"/><line x1="216" y1="72" x2="216" y2="96" stroke="#3B82F6" stroke-width="0.8"/><line x1="198" y1="84" x2="234" y2="84" stroke="#3B82F6" stroke-width="0.8"/>
  <rect x="240" y="72" width="36" height="24" rx="2" fill="#1E3A5F"/><line x1="258" y1="72" x2="258" y2="96" stroke="#3B82F6" stroke-width="0.8"/><line x1="240" y1="84" x2="276" y2="84" stroke="#3B82F6" stroke-width="0.8"/>
  <rect x="282" y="72" width="36" height="24" rx="2" fill="#1E3A5F"/><line x1="300" y1="72" x2="300" y2="96" stroke="#3B82F6" stroke-width="0.8"/><line x1="282" y1="84" x2="318" y2="84" stroke="#3B82F6" stroke-width="0.8"/>
