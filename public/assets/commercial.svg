  <rect x="130" y="120" width="36" height="22" rx="2" fill="#BAE6FD"/><line x1="148" y1="120" x2="148" y2="142" stroke="#7DD3FC" stroke-width="1"/><line x1="130" y1="131" x2="166" y2="131" stroke="#7DD3FC" stroke-width="1"/>
  <rect x="180" y="120" width="36" height="22" rx="2" fill="#BAE6FD"/><line x1="198" y1="120" x2="198" y2="142" stroke="#7DD3FC" stroke-width="1"/><line x1="180" y1="131" x2="216" y2="131" stroke="#7DD3FC" stroke-width="1"/>
  <rect x="230" y="120" width="36" height="22" rx="2" fill="#BAE6FD"/><line x1="248" y1="120" x2="248" y2="142" stroke="#7DD3FC" stroke-width="1"/><line x1="230" y1="131" x2="266" y2="131" stroke="#7DD3FC" stroke-width="1"/>
  <rect x="280" y="120" width="36" height="22" rx="2" fill="#BAE6FD"/><line x1="298" y1="120" x2="298" y2="142" stroke="#7DD3FC" stroke-width="1"/><line x1="280" y1="131" x2="316" y2="131" stroke="#7DD3FC" stroke-width="1"/>
