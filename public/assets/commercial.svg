  <rect x="80"  y="162" width="36" height="22" rx="2" fill="#BAE6FD"/><line x1="98"  y1="162" x2="98"  y2="184" stroke="#7DD3FC" stroke-width="1"/>
  <rect x="130" y="162" width="36" height="22" rx="2" fill="#BAE6FD"/>
  <rect x="180" y="162" width="36" height="22" rx="2" fill="#BAE6FD"/>
  <rect x="230" y="162" width="36" height="22" rx="2" fill="#BAE6FD"/>
  <rect x="280" y="162" width="36" height="22" rx="2" fill="#BAE6FD"/>
  <!-- Entry door -->
  <rect x="170" y="212" width="60" height="36" rx="3" fill="#F97316"/>
  <circle cx="185" cy="232" r="3" fill="#FFF"/>
  <!-- Trees -->
  <rect x="20" y="200" width="8" height="48" fill="#78350F"/>
  <ellipse cx="24" cy="192" rx="22" ry="26" fill="#16A34A"/>
  <rect x="372" y="200" width="8" height="48" fill="#78350F"/>
  <ellipse cx="376" cy="192" rx="22" ry="26" fill="#16A34A"/>
