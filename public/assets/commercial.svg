<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Sky gradient background -->
  <rect width="400" height="300" fill="#F0F9FF"/>
  <!-- Sun -->
  <circle cx="350" cy="50" r="32" fill="#FCD34D"/>
  <g stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round">
    <line x1="350" y1="6" x2="350" y2="0"/>
    <line x1="350" y1="100" x2="350" y2="94"/>
    <line x1="306" y1="50" x2="300" y2="50"/>
    <line x1="394" y1="50" x2="388" y2="50"/>
    <line x1="319" y1="19" x2="315" y2="15"/>
    <line x1="385" y1="85" x2="381" y2="81"/>
    <line x1="381" y1="19" x2="385" y2="15"/>
    <line x1="315" y1="85" x2="319" y2="81"/>
