    <line x1="128" y1="196" x2="128" y2="232" stroke="#60A5FA" stroke-width="1"/>
    <line x1="100" y1="214" x2="156" y2="214" stroke="#60A5FA" stroke-width="1"/>
    <rect x="170" y="196" width="56" height="36" rx="3" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1"/>
