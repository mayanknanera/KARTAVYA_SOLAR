    <rect x="84"  y="122" width="34" height="22" rx="2" fill="#1E3A5F" stroke="#3B82F6" stroke-width="0.8"/>
    <rect x="128" y="122" width="34" height="22" rx="2" fill="#1E3A5F" stroke="#3B82F6" stroke-width="0.8"/>
    <rect x="172" y="122" width="34" height="22" rx="2" fill="#1E3A5F" stroke="#3B82F6" stroke-width="0.8"/>
    <rect x="216" y="122" width="34" height="22" rx="2" fill="#1E3A5F" stroke="#3B82F6" stroke-width="0.8"/>
