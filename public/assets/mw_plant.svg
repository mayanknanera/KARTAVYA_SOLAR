  <!-- Power lines -->
  <path d="M 380 88 Q 300 120 200 100" stroke="#94A3B8" stroke-width="1.5" fill="none"/>
  <path d="M 380 110 Q 300 140 200 122" stroke="#94A3B8" stroke-width="1.5" fill="none"/>
