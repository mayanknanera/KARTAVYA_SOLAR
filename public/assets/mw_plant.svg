  <g stroke="#FCD34D" stroke-width="2.5" stroke-linecap="round">
    <line x1="60" y1="9" x2="60" y2="3"/>
    <line x1="60" y1="107" x2="60" y2="101"/>
    <line x1="14" y1="55" x2="8" y2="55"/>
    <line x1="106" y1="55" x2="112" y2="55"/>
    <line x1="27" y1="22" x2="23" y2="18"/>
