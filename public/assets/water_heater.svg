<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#F0F9FF"/>
  <!-- Mounting frame/stand -->
  <rect x="160" y="218" width="80" height="10" rx="2" fill="#94A3B8"/>
  <line x1="178" y1="228" x2="168" y2="270" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <line x1="222" y1="228" x2="232" y2="270" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <line x1="155" y1="270" x2="245" y2="270" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <!-- Tank -->
  <rect x="128" y="90" width="144" height="130" rx="20" fill="#CBD5E1"/>
  <rect x="128" y="90" width="144" height="130" rx="20" stroke="#94A3B8" stroke-width="2"/>
  <!-- Tank shine -->
  <rect x="136" y="100" width="18" height="110" rx="9" fill="#E2E8F0" opacity="0.6"/>
  <!-- Tank label area -->
  <rect x="148" y="130" width="104" height="50" rx="8" fill="#F8FAFC"/>
  <rect x="148" y="130" width="104" height="50" rx="8" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- Solar logo on tank -->
  <circle cx="172" cy="155" r="14" fill="#FCD34D"/>
  <g stroke="#F97316" stroke-width="2" stroke-linecap="round">
    <line x1="172" y1="136" x2="172" y2="132"/>
    <line x1="172" y1="178" x2="172" y2="174"/>
    <line x1="153" y1="155" x2="149" y2="155"/>
    <line x1="191" y1="155" x2="195" y2="155"/>
    <line x1="159" y1="142" x2="156" y2="139"/>
    <line x1="185" y1="168" x2="188" y2="171"/>
    <line x1="185" y1="142" x2="188" y2="139"/>
    <line x1="159" y1="168" x2="156" y2="171"/>
  </g>
  <!-- Pipe out top -->
  <rect x="190" y="68" width="20" height="24" rx="4" fill="#94A3B8"/>
  <!-- Pipe bottom (hot water out) -->
  <rect x="230" y="204" width="16" height="36" rx="4" fill="#F97316"/>
  <!-- Collector tubes panel -->
  <rect x="70" y="52" width="260" height="40" rx="6" fill="#1E3A5F"/>
  <rect x="70" y="52" width="260" height="40" rx="6" stroke="#3B82F6" stroke-width="1.5"/>
  <!-- Individual tubes in collector -->
  <rect x="80"  y="57" width="18" height="30" rx="9" fill="#BAE6FD" opacity="0.9"/>
  <rect x="104" y="57" width="18" height="30" rx="9" fill="#BAE6FD" opacity="0.9"/>
  <rect x="128" y="57" width="18" height="30" rx="9" fill="#BAE6FD" opacity="0.9"/>
  <rect x="152" y="57" width="18" height="30" rx="9" fill="#BAE6FD" opacity="0.9"/>
  <rect x="176" y="57" width="18" height="30" rx="9" fill="#BAE6FD" opacity="0.9"/>
  <rect x="200" y="57" width="18" height="30" rx="9" fill="#BAE6FD" opacity="0.9"/>
  <rect x="224" y="57" width="18" height="30" rx="9" fill="#BAE6FD" opacity="0.9"/>
  <rect x="248" y="57" width="18" height="30" rx="9" fill="#BAE6FD" opacity="0.9"/>
  <rect x="272" y="57" width="18" height="30" rx="9" fill="#BAE6FD" opacity="0.9"/>
  <rect x="296" y="57" width="18" height="30" rx="9" fill="#BAE6FD" opacity="0.9"/>
  <!-- Connection from collector to tank -->
  <line x1="200" y1="92" x2="200" y2="68" stroke="#60A5FA" stroke-width="3"/>
  <!-- Sun -->
  <circle cx="355" cy="42" r="26" fill="#FCD34D"/>
  <g stroke="#FCD34D" stroke-width="2" stroke-linecap="round">
    <line x1="355" y1="5" x2="355" y2="0"/>
    <line x1="355" y1="84" x2="355" y2="79"/>
    <line x1="315" y1="42" x2="310" y2="42"/>
    <line x1="395" y1="42" x2="390" y2="42"/>
    <line x1="327" y1="14" x2="323" y2="10"/>
    <line x1="383" y1="70" x2="387" y2="74"/>
    <line x1="383" y1="14" x2="387" y2="10"/>
    <line x1="327" y1="70" x2="323" y2="74"/>
  </g>
  <!-- Hot water steam lines -->
  <path d="M 246 200 Q 252 188 246 178" stroke="#F97316" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 258 204 Q 264 190 258 178" stroke="#F97316" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Ground line -->
  <rect x="0" y="272" width="400" height="28" fill="#D1FAE5"/>
</svg>
