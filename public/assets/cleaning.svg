<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#F0FDF4"/>
  <!-- Rooftop edge -->
  <rect x="20" y="210" width="360" height="20" rx="4" fill="#CBD5E1"/>
  <rect x="20" y="220" width="360" height="80" fill="#E2E8F0"/>
  <!-- Solar panels on roof -->
  <!-- Panel 1 -->
  <rect x="30"  y="150" width="70" height="52" rx="4" fill="#1E3A5F"/>
  <rect x="30"  y="150" width="70" height="52" rx="4" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="65"  y1="150" x2="65"  y2="202" stroke="#60A5FA" stroke-width="1"/>
  <line x1="30"  y1="176" x2="100" y2="176" stroke="#60A5FA" stroke-width="1"/>
  <!-- Panel 2 -->
  <rect x="115" y="150" width="70" height="52" rx="4" fill="#1E3A5F"/>
  <rect x="115" y="150" width="70" height="52" rx="4" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="150" y1="150" x2="150" y2="202" stroke="#60A5FA" stroke-width="1"/>
  <line x1="115" y1="176" x2="185" y2="176" stroke="#60A5FA" stroke-width="1"/>
  <!-- Panel 3 -->
  <rect x="200" y="150" width="70" height="52" rx="4" fill="#1E3A5F"/>
  <rect x="200" y="150" width="70" height="52" rx="4" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="235" y1="150" x2="235" y2="202" stroke="#60A5FA" stroke-width="1"/>
  <line x1="200" y1="176" x2="270" y2="176" stroke="#60A5FA" stroke-width="1"/>
  <!-- Panel 4 -->
  <rect x="285" y="150" width="70" height="52" rx="4" fill="#1E3A5F"/>
  <rect x="285" y="150" width="70" height="52" rx="4" stroke="#3B82F6" stroke-width="1.5"/>
  <line x1="320" y1="150" x2="320" y2="202" stroke="#60A5FA" stroke-width="1"/>
  <line x1="285" y1="176" x2="355" y2="176" stroke="#60A5FA" stroke-width="1"/>
  <!-- Sprinkler pipes (horizontal) -->
  <rect x="25" y="138" width="350" height="8" rx="4" fill="#60A5FA"/>
  <!-- Sprinkler heads -->
  <circle cx="65"  cy="134" r="6" fill="#2563EB"/>
  <circle cx="150" cy="134" r="6" fill="#2563EB"/>
  <circle cx="235" cy="134" r="6" fill="#2563EB"/>
  <circle cx="320" cy="134" r="6" fill="#2563EB"/>
  <!-- Water droplets from sprinklers -->
  <g fill="#60A5FA" opacity="0.8">
    <ellipse cx="52"  cy="148" rx="3" ry="4"/>
    <ellipse cx="60"  cy="152" rx="2" ry="3"/>
    <ellipse cx="70"  cy="148" rx="3" ry="4"/>
    <ellipse cx="78"  cy="154" rx="2" ry="3"/>
    <ellipse cx="136" cy="148" rx="3" ry="4"/>
    <ellipse cx="144" cy="152" rx="2" ry="3"/>
    <ellipse cx="155" cy="148" rx="3" ry="4"/>
    <ellipse cx="163" cy="154" rx="2" ry="3"/>
    <ellipse cx="221" cy="148" rx="3" ry="4"/>
    <ellipse cx="229" cy="152" rx="2" ry="3"/>
    <ellipse cx="240" cy="148" rx="3" ry="4"/>
    <ellipse cx="248" cy="154" rx="2" ry="3"/>
    <ellipse cx="306" cy="148" rx="3" ry="4"/>
    <ellipse cx="314" cy="152" rx="2" ry="3"/>
    <ellipse cx="325" cy="148" rx="3" ry="4"/>
    <ellipse cx="333" cy="154" rx="2" ry="3"/>
  </g>
  <!-- Panel sheen after cleaning -->
  <rect x="30"  y="150" width="70" height="10" rx="3" fill="white" opacity="0.15"/>
  <rect x="115" y="150" width="70" height="10" rx="3" fill="white" opacity="0.15"/>
  <!-- Gear/robot icon bottom right -->
  <circle cx="360" cy="260" r="28" fill="#F97316"/>
  <circle cx="360" cy="260" r="18" fill="#EA580C"/>
  <circle cx="360" cy="260" r="8" fill="#F97316"/>
  <rect x="356" y="232" width="8" height="8" rx="2" fill="#F97316"/>
  <rect x="356" y="280" width="8" height="8" rx="2" fill="#F97316"/>
  <rect x="332" y="256" width="8" height="8" rx="2" fill="#F97316"/>
  <rect x="380" y="256" width="8" height="8" rx="2" fill="#F97316"/>
  <!-- Power supply box -->
  <rect x="30" y="248" width="60" height="40" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <circle cx="60" cy="268" r="8" fill="#22C55E"/>
  <text x="60" y="272" text-anchor="middle" font-size="8" fill="white" font-family="sans-serif">ON</text>
</svg>
